<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Sliders - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
    
    <style>
        body { overflow-x: hidden; }
        #sidebar { min-width: 250px; background-color: #f8f9fa; border-right: 1px solid #dee2e6; max-width: 250px; min-height: 100vh; transition: all 0.3s; }
        #sidebar .nav-link { color: #495057; border-radius: 6px; margin-bottom: 5px; font-weight: 500; }
        #sidebar .nav-link:hover { color: #0d6efd; background: rgba(13, 110, 253, 0.05); }
        #sidebar .nav-link.active { color: #0d6efd; background: rgba(13, 110, 253, 0.1); font-weight: 600; }
        #page-content-wrapper { width: 100%; }
        .admin-footer { margin-top: auto; background-color: #000; padding: 16px 20px; text-align: center; color: #fff; font-size: 0.875rem; }
        @media (max-width: 768px) {
            #sidebar { margin-left: -250px; position: fixed; z-index: 1000; }
            #sidebar.active { margin-left: 0; }
        }

        
        
        .dashboard-title { font-weight: 700; text-align: center; margin-bottom: 2rem; }
        .admin-footer { margin-top: auto; background-color: #000; padding: 16px 20px; text-align: center; color: #fff; font-size: 0.875rem; }
        .editor-container { background: #fff; border: 1px solid #ced4da; border-radius: 0.375rem; padding: 1rem; }
        #pageContent { min-height: 400px; font-family: monospace; }
    </style>
</head>
<body>
    
    <div id="wrapper" class="d-flex">
        <!-- Sidebar -->
        <nav id="sidebar" class="bg-light text-dark p-3 d-flex flex-column">
            <a class="navbar-brand text-dark d-flex align-items-center mb-4" href="/admin">
                <img src="/images/logo.png" alt="Logo" height="40" class="me-2 bg-white rounded">
                <span class="fs-5 fw-bold">Admin Panel</span>
            </a>
            <hr class="text-secondary">
            <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item"><a class="nav-link " href="/admin"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link " href="/admin/members"><i class="bi bi-people me-2"></i> Members</a></li>
                <li class="nav-item"><a class="nav-link " href="/admin/contacts"><i class="bi bi-envelope me-2"></i> Contacts</a></li>
                <li class="nav-item"><a class="nav-link " href="/admin/newsletter"><i class="bi bi-newspaper me-2"></i> Newsletter</a></li>
                <li class="nav-item"><a class="nav-link " href="/admin/menu"><i class="bi bi-list me-2"></i> Menu</a></li>
                <li class="nav-item"><a class="nav-link " href="/admin/pages"><i class="bi bi-file-earmark-text me-2"></i> Pages</a></li>
                <li class="nav-item"><a class="nav-link " href="/admin/projects"><i class="bi bi-briefcase me-2"></i> Projects</a></li>
                <li class="nav-item"><a class="nav-link " href="/admin/events"><i class="bi bi-calendar-event me-2"></i> Events</a></li>
                <li class="nav-item"><a class="nav-link active" href="/admin/sliders"><i class="bi bi-images me-2"></i> Sliders</a></li>
            </ul>
            <hr class="text-secondary">
            <div>
                <a href="#" class="nav-link text-dark" id="logoutLink"><i class="bi bi-box-arrow-right me-2"></i> Logout</a>
            </div>
        </nav>

        <!-- Page Content -->
        <div id="page-content-wrapper" class="flex-grow-1 d-flex flex-column min-vh-100">
            <!-- Top Navbar for mobile toggle -->
            <nav class="navbar navbar-light bg-light border-bottom d-md-none px-3">
                <button class="btn btn-outline-dark" id="sidebarToggle"><i class="bi bi-list fs-4"></i></button>
                <span class="navbar-brand mb-0 h1 ms-2">Admin Panel</span>
            </nav>


    <main class="container flex-grow-1 py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="page-title mb-0">Manage Sliders</h1>
            <button class="btn btn-primary" id="addSliderBtn"><i class="bi bi-plus-lg me-2"></i>Add Slider</button>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="slidersTable">
                        <thead class="table-light">
                            <tr>
                                <th width="100">Image</th>
                                <th>Title</th>
                                <th>Order</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Slider Modal -->
    <div class="modal fade" id="sliderModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="sliderModalTitle">Add New Slider</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="sliderForm">
                        <input type="hidden" id="sliderId">
                        <div class="row mb-3">
                            <div class="col-md-12 mb-3">
                                <label class="form-label fw-bold">Image <span class="text-danger">*</span></label>
                                <input type="file" class="form-control mb-2" id="sliderImageFile" accept="image/*">
                                <span id="sliderImageStatus" class="badge bg-secondary mb-2" style="display:none;"></span>
                                <input type="hidden" id="sliderImage">
                                <div id="sliderImagePreviewContainer" style="display:none;">
                                    <img id="sliderImagePreview" src="" alt="Preview" style="max-height: 100px; border-radius: 4px;">
                                </div>
                            </div>
                            <div class="col-md-12 mb-3">
                                <label class="form-label fw-bold">Headline Title</label>
                                <input type="text" class="form-control" id="sliderTitle" placeholder="e.g. Welcome to Leo Club of Kathmandu Alka">
                            </div>
                            <div class="col-md-12 mb-3">
                                <label class="form-label fw-bold">Tagline</label>
                                <input type="text" class="form-control" id="sliderTagline" placeholder="e.g. Youth making a difference in the community">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Button 1 Text</label>
                                <input type="text" class="form-control" id="sliderBtn1Text" placeholder="e.g. Become a Member">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Button 1 URL</label>
                                <input type="text" class="form-control" id="sliderBtn1Url" placeholder="e.g. membership.html">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Button 2 Text</label>
                                <input type="text" class="form-control" id="sliderBtn2Text" placeholder="e.g. Learn More">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Button 2 URL</label>
                                <input type="text" class="form-control" id="sliderBtn2Url" placeholder="e.g. about.html">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Order</label>
                                <input type="number" class="form-control" id="sliderOrder" value="0">
                            </div>
                            <div class="col-md-6 mb-3">
                                <div class="form-check form-switch mt-4">
                                    <input class="form-check-input" type="checkbox" id="sliderIsActive" checked>
                                    <label class="form-check-label fw-bold" for="sliderIsActive">Is Active</label>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveSliderBtn">Save Slider</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="admin-footer">
        <img src="/images/logo.png" alt="Leo Club Logo" height="30" class="me-2 mb-1">
        &copy; 2026 Leo Club of Kathmandu Alka - All rights reserved
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/admin-common.js"></script>
    <script src="/js/admin-sliders.js"></script>

    </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('sidebarToggle');
            if(toggle) {
                toggle.addEventListener('click', function() {
                    document.getElementById('sidebar').classList.toggle('active');
                });
            }
        });
    </script>
</body>
</html>
