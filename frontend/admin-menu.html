<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Menu - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
    
    <style>
        body { overflow-x: hidden; }
        #sidebar { min-width: 250px; background-color: #f8f9fa; border-right: 1px solid #dee2e6; max-width: 250px; min-height: 100vh; transition: all 0.3s; }
        #sidebar .nav-link { color: #495057; border-radius: 6px; margin-bottom: 5px; font-weight: 500; }
        #sidebar .nav-link:hover { color: #0d6efd; background: rgba(13, 110, 253, 0.05); }
        #sidebar .nav-link.active { color: #0d6efd; background: rgba(13, 110, 253, 0.1); font-weight: 600; }
        #page-content-wrapper { width: 100%; }
        .admin-footer { margin-top: auto; background-color: #000; padding: 16px 20px; text-align: center; color: #fff; font-size: 0.875rem; }
        @media (max-width: 768px) {
            #sidebar { margin-left: -250px; position: fixed; z-index: 1000; }
            #sidebar.active { margin-left: 0; }
        }

        
        
        .dashboard-title { font-weight: 700; text-align: center; margin-bottom: 2rem; }
        .admin-footer { margin-top: auto; background-color: #000; padding: 16px 20px; text-align: center; color: #fff; font-size: 0.875rem; }
    </style>
</head>
<body>
    
    <div id="wrapper" class="d-flex">
        <!-- Sidebar -->
        <nav id="sidebar" class="bg-light text-dark p-3 d-flex flex-column">
            <a class="navbar-brand text-dark d-flex align-items-center mb-4" href="/admin">
                <img src="/images/logo.png" alt="Logo" height="40" class="me-2 bg-white rounded">
                <span class="fs-5 fw-bold">Admin Panel</span>
            </a>
            <hr class="text-secondary">
            <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item"><a class="nav-link " href="/admin"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link " href="/admin/members"><i class="bi bi-people me-2"></i> Members</a></li>
                <li class="nav-item"><a class="nav-link " href="/admin/contacts"><i class="bi bi-envelope me-2"></i> Contacts</a></li>
                <li class="nav-item"><a class="nav-link " href="/admin/newsletter"><i class="bi bi-newspaper me-2"></i> Newsletter</a></li>
                <li class="nav-item"><a class="nav-link active" href="/admin/menu"><i class="bi bi-list me-2"></i> Menu</a></li>
                <li class="nav-item"><a class="nav-link " href="/admin/pages"><i class="bi bi-file-earmark-text me-2"></i> Pages</a></li>
                <li class="nav-item"><a class="nav-link " href="/admin/projects"><i class="bi bi-briefcase me-2"></i> Projects</a></li>
                <li class="nav-item"><a class="nav-link " href="/admin/events"><i class="bi bi-calendar-event me-2"></i> Events</a></li>
                <li class="nav-item"><a class="nav-link " href="/admin/sliders"><i class="bi bi-images me-2"></i> Sliders</a></li>
            </ul>
            <hr class="text-secondary">
            <div>
                <a href="#" class="nav-link text-dark" id="logoutLink"><i class="bi bi-box-arrow-right me-2"></i> Logout</a>
            </div>
        </nav>

        <!-- Page Content -->
        <div id="page-content-wrapper" class="flex-grow-1 d-flex flex-column min-vh-100">
            <!-- Top Navbar for mobile toggle -->
            <nav class="navbar navbar-light bg-light border-bottom d-md-none px-3">
                <button class="btn btn-outline-dark" id="sidebarToggle"><i class="bi bi-list fs-4"></i></button>
                <span class="navbar-brand mb-0 h1 ms-2">Admin Panel</span>
            </nav>


    <main class="container flex-grow-1 py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 fw-bold mb-0">Manage Menu Links</h1>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#menuModal" onclick="openMenuModal()">
                <i class="bi bi-plus-lg"></i> Add Menu Item
            </button>
        </div>
        
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Order</th>
                                <th>Title</th>
                                <th>URL</th>
                                <th>Active</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="menuTableBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Menu Modal -->
    <div class="modal fade" id="menuModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="menuModalTitle">Add Menu Item</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="menuForm">
                        <input type="hidden" id="menuId">
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" class="form-control" id="menuTitle" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">URL (e.g. /about.html or https://...)</label>
                            <input type="text" class="form-control" id="menuUrl" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Order</label>
                            <input type="number" class="form-control" id="menuOrder" value="0">
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="menuActive" checked>
                            <label class="form-check-label">Is Active</label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveMenu()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="admin-footer">
        <img src="/images/logo.png" alt="Leo Club Logo" height="30" class="me-2 mb-1">
        &copy; 2026 Leo Club of Kathmandu Alka - All rights reserved
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/admin-common.js"></script>
    <script src="/js/admin-menu.js"></script>

    </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('sidebarToggle');
            if(toggle) {
                toggle.addEventListener('click', function() {
                    document.getElementById('sidebar').classList.toggle('active');
                });
            }
        });
    </script>
</body>
</html>
