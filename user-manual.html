<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Manual Generator - Leo Club Nomination Form</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
        }
        .container {
            text-align: center;
            padding: 3rem;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            max-width: 500px;
        }
        h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: #f1c40f; }
        p { margin-bottom: 2rem; color: #94a3b8; line-height: 1.6; }
        .btn {
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            color: #0f172a;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(241,196,15,0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .progress { margin-top: 1.5rem; display: none; }
        .progress-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }
        .progress-fill {
            background: linear-gradient(90deg, #f1c40f, #f39c12);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }
        .progress-text { font-size: 0.85rem; color: #94a3b8; }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📄</div>
        <h1>User Manual Generator</h1>
        <p>Generate a comprehensive PDF user manual with step-by-step instructions for filling up the Leo Club Nomination Form.</p>
        <button class="btn" id="generateBtn" onclick="generatePDF()">Generate PDF Manual</button>
        <div class="progress" id="progress">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">Generating...</div>
        </div>
    </div>

    <script>
    async function generatePDF() {
        const btn = document.getElementById('generateBtn');
        const progress = document.getElementById('progress');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        
        btn.disabled = true;
        progress.style.display = 'block';
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const W = 210, H = 297;
        const ML = 20, MR = 20, MT = 20, MB = 20;
        const CW = W - ML - MR; // content width = 170
        
        let currentY = MT;
        let pageNum = 1;
        
        // Color palette
        const NAVY = [15, 23, 42];
        const DARK_BLUE = [30, 41, 59];
        const GOLD = [241, 196, 15];
        const LIGHT_GOLD = [253, 246, 227];
        const WHITE = [255, 255, 255];
        const LIGHT_GRAY = [248, 250, 252];
        const MEDIUM_GRAY = [148, 163, 184];
        const TEXT_DARK = [51, 65, 85];
        const TEXT_LIGHT = [100, 116, 139];
        const SUCCESS = [34, 197, 94];
        const WARNING = [239, 68, 68];
        const INFO_BLUE = [59, 130, 246];
        
        function updateProgress(percent, text) {
            progressFill.style.width = percent + '%';
            progressText.textContent = text;
        }
        
        function addPage() {
            doc.addPage();
            pageNum++;
            currentY = MT;
        }
        
        function checkSpace(needed) {
            if (currentY + needed > H - MB) {
                addPage();
                return true;
            }
            return false;
        }
        
        function drawRoundedRect(x, y, w, h, r, fillColor, strokeColor) {
            if (fillColor) {
                doc.setFillColor(...fillColor);
            }
            if (strokeColor) {
                doc.setDrawColor(...strokeColor);
                doc.setLineWidth(0.3);
            }
            doc.roundedRect(x, y, w, h, r, r, fillColor && strokeColor ? 'FD' : (fillColor ? 'F' : 'S'));
        }
        
        function drawPageFooter() {
            doc.setFontSize(8);
            doc.setTextColor(...MEDIUM_GRAY);
            doc.text('Leo Club of Kathmandu Alka - Nomination Form User Manual', W / 2, H - 8, { align: 'center' });
            doc.text(`Page ${pageNum}`, W - MR, H - 8, { align: 'right' });
            // Thin line above footer
            doc.setDrawColor(...MEDIUM_GRAY);
            doc.setLineWidth(0.2);
            doc.line(ML, H - 14, W - MR, H - 14);
        }
        
        // ========================================
        // COVER PAGE
        // ========================================
        updateProgress(5, 'Creating cover page...');
        await new Promise(r => setTimeout(r, 100));
        
        // Full page navy background
        doc.setFillColor(...NAVY);
        doc.rect(0, 0, W, H, 'F');
        
        // Gold decorative top band
        doc.setFillColor(...GOLD);
        doc.rect(0, 0, W, 4, 'F');
        
        // Decorative circle patterns
        doc.setFillColor(241, 196, 15, 0.1);
        doc.setDrawColor(241, 196, 15);
        doc.setLineWidth(0.5);
        doc.circle(W/2, 70, 35, 'S');
        doc.circle(W/2, 70, 28, 'S');
        doc.circle(W/2, 70, 20, 'S');
        
        // Leo icon text
        doc.setFontSize(40);
        doc.setTextColor(...GOLD);
        doc.text('📋', W/2, 75, { align: 'center' });
        
        // Title
        doc.setFontSize(32);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(...WHITE);
        doc.text('USER MANUAL', W/2, 115, { align: 'center' });
        
        // Subtitle
        doc.setFontSize(14);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(...GOLD);
        doc.text('Leo Club of Kathmandu Alka', W/2, 128, { align: 'center' });
        
        // Divider line
        doc.setDrawColor(...GOLD);
        doc.setLineWidth(1);
        doc.line(W/2 - 30, 135, W/2 + 30, 135);
        
        // Description
        doc.setFontSize(16);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(...WHITE);
        doc.text('Nomination Form', W/2, 148, { align: 'center' });
        doc.text('Step-by-Step Guide', W/2, 158, { align: 'center' });
        
        doc.setFontSize(11);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(...MEDIUM_GRAY);
        doc.text('A comprehensive guide to navigating and', W/2, 175, { align: 'center' });
        doc.text('filling up the online nomination form', W/2, 182, { align: 'center' });
        
        // Info box at bottom
        drawRoundedRect(ML + 20, 210, CW - 40, 40, 3, DARK_BLUE, GOLD);
        doc.setFontSize(10);
        doc.setTextColor(...GOLD);
        doc.text('WEBSITE', W/2, 222, { align: 'center' });
        doc.setFontSize(11);
        doc.setTextColor(...WHITE);
        doc.text('https://ktmalka-nomination.vercel.app', W/2, 230, { align: 'center' });
        doc.setFontSize(9);
        doc.setTextColor(...MEDIUM_GRAY);
        doc.text('Leo District Council 325 F, Nepal  |  Club ID: 126845', W/2, 240, { align: 'center' });
        
        // Version info
        doc.setFontSize(9);
        doc.setTextColor(...MEDIUM_GRAY);
        const today = new Date();
        doc.text(`Version 1.0  |  ${today.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}`, W/2, H - 20, { align: 'center' });
        
        // Gold bottom band
        doc.setFillColor(...GOLD);
        doc.rect(0, H - 4, W, 4, 'F');
        
        // ========================================
        // TABLE OF CONTENTS
        // ========================================
        updateProgress(12, 'Creating table of contents...');
        await new Promise(r => setTimeout(r, 100));
        addPage();
        
        // Header
        doc.setFillColor(...NAVY);
        doc.rect(0, 0, W, 45, 'F');
        doc.setFillColor(...GOLD);
        doc.rect(0, 0, W, 3, 'F');
        
        doc.setFontSize(22);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(...WHITE);
        doc.text('Table of Contents', W/2, 30, { align: 'center' });
        
        currentY = 60;
        
        const tocItems = [
            { num: '1', title: 'Getting Started', sub: 'Accessing the form & welcome modal', page: '3' },
            { num: '2', title: 'Member Directory Search', sub: 'Using the search sidebar to find your Leo ID', page: '4' },
            { num: '3', title: 'Step 1: Personal Information', sub: 'Entering your personal details & Leo ID verification', page: '5' },
            { num: '4', title: 'Step 2: Position Selection', sub: 'Choosing your desired position & viewing criteria', page: '6' },
            { num: '5', title: 'Step 3: Candidate Statements', sub: 'Writing your experience, interests, and plans', page: '7' },
            { num: '6', title: 'Step 4: Required Documents', sub: 'Uploading cover letter, photo, citizenship & more', page: '8' },
            { num: '7', title: 'Step 5: Payment Details', sub: 'Scanning QR, paying fee & entering transaction code', page: '9' },
            { num: '8', title: 'Step 6: Declaration & Submission', sub: 'Final confirmation, preview, and submission', page: '10' },
            { num: '9', title: 'Troubleshooting & FAQ', sub: 'Common issues and solutions', page: '11' },
        ];
        
        tocItems.forEach((item, i) => {
            // Number circle
            doc.setFillColor(...GOLD);
            doc.circle(ML + 6, currentY + 3, 5, 'F');
            doc.setFontSize(10);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(...NAVY);
            doc.text(item.num, ML + 6, currentY + 4.5, { align: 'center' });
            
            // Title
            doc.setFontSize(12);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(...TEXT_DARK);
            doc.text(item.title, ML + 16, currentY + 2);
            
            // Subtitle
            doc.setFontSize(9);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(...TEXT_LIGHT);
            doc.text(item.sub, ML + 16, currentY + 8);
            
            // Dotted line
            doc.setDrawColor(...MEDIUM_GRAY);
            doc.setLineWidth(0.1);
            doc.setLineDashPattern([1, 1], 0);
            const titleWidth = doc.getTextWidth(item.title);
            doc.line(ML + 16 + titleWidth + 3, currentY + 1, W - MR - 12, currentY + 1);
            doc.setLineDashPattern([], 0);
            
            // Page number
            doc.setFontSize(11);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(...GOLD);
            doc.text(item.page, W - MR - 5, currentY + 2, { align: 'right' });
            
            currentY += 20;
            
            // Separator line
            if (i < tocItems.length - 1) {
                doc.setDrawColor(226, 232, 240);
                doc.setLineWidth(0.2);
                doc.line(ML + 16, currentY - 6, W - MR, currentY - 6);
            }
        });
        
        drawPageFooter();
        
        // ========================================
        // SECTION: GETTING STARTED
        // ========================================
        updateProgress(20, 'Creating Getting Started section...');
        await new Promise(r => setTimeout(r, 100));
        addPage();
        
        // Section header
        function drawSectionHeader(title, stepNum) {
            doc.setFillColor(...NAVY);
            doc.rect(0, 0, W, 45, 'F');
            doc.setFillColor(...GOLD);
            doc.rect(0, 0, W, 3, 'F');
            
            if (stepNum) {
                doc.setFillColor(...GOLD);
                doc.circle(ML + 10, 28, 8, 'F');
                doc.setFontSize(14);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(...NAVY);
                doc.text(stepNum.toString(), ML + 10, 31, { align: 'center' });
                
                doc.setFontSize(20);
                doc.setTextColor(...WHITE);
                doc.text(title, ML + 24, 32);
            } else {
                doc.setFontSize(22);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(...WHITE);
                doc.text(title, W/2, 30, { align: 'center' });
            }
            
            currentY = 55;
        }
        
        function drawStepBox(title, description, icon, bgColor) {
            checkSpace(40);
            
            drawRoundedRect(ML, currentY, CW, 32, 3, bgColor || LIGHT_GRAY, null);
            
            doc.setFontSize(16);
            doc.setTextColor(...NAVY);
            doc.text(icon || '▶', ML + 6, currentY + 12);
            
            doc.setFontSize(11);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(...TEXT_DARK);
            doc.text(title, ML + 16, currentY + 11);
            
            doc.setFontSize(9);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(...TEXT_LIGHT);
            const lines = doc.splitTextToSize(description, CW - 22);
            doc.text(lines, ML + 16, currentY + 18);
            
            currentY += 36;
        }
        
        function drawInfoBox(text, type) {
            checkSpace(28);
            
            let bgColor, borderColor, iconText, labelColor;
            switch(type) {
                case 'tip':
                    bgColor = [240, 253, 244]; borderColor = SUCCESS; iconText = '💡 TIP:'; labelColor = SUCCESS;
                    break;
                case 'warning':
                    bgColor = [254, 242, 242]; borderColor = WARNING; iconText = '⚠️ WARNING:'; labelColor = WARNING;
                    break;
                case 'info':
                    bgColor = [239, 246, 255]; borderColor = INFO_BLUE; iconText = 'ℹ️ NOTE:'; labelColor = INFO_BLUE;
                    break;
                default:
                    bgColor = LIGHT_GOLD; borderColor = GOLD; iconText = '📌 IMPORTANT:'; labelColor = GOLD;
                    break;
            }
            
            const lines = doc.splitTextToSize(text, CW - 18);
            const boxH = 12 + (lines.length * 4.5);
            
            checkSpace(boxH + 4);
            
            drawRoundedRect(ML, currentY, CW, boxH, 2, bgColor, null);
            doc.setFillColor(...borderColor);
            doc.rect(ML, currentY, 2, boxH, 'F');
            
            doc.setFontSize(8);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(...labelColor);
            doc.text(iconText, ML + 6, currentY + 6);
            
            doc.setFontSize(9);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(...TEXT_DARK);
            doc.text(lines, ML + 6, currentY + 12);
            
            currentY += boxH + 5;
        }
        
        function drawNumberedInstruction(num, title, desc) {
            checkSpace(24);
            
            // Number badge
            doc.setFillColor(...NAVY);
            doc.circle(ML + 5, currentY + 4, 4, 'F');
            doc.setFontSize(8);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(...WHITE);
            doc.text(num.toString(), ML + 5, currentY + 5.5, { align: 'center' });
            
            // Title
            doc.setFontSize(10);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(...TEXT_DARK);
            doc.text(title, ML + 13, currentY + 5);
            
            // Description
            if (desc) {
                doc.setFontSize(9);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(...TEXT_LIGHT);
                const lines = doc.splitTextToSize(desc, CW - 18);
                doc.text(lines, ML + 13, currentY + 11);
                currentY += 8 + (lines.length * 4.5);
            } else {
                currentY += 12;
            }
        }
        
        function drawScreenMockup(title, elements, width, height) {
            checkSpace(height + 15);
            
            const mockX = ML + (CW - width) / 2;
            
            // Browser frame
            drawRoundedRect(mockX, currentY, width, height, 4, WHITE, [200, 210, 220]);
            
            // Title bar
            doc.setFillColor(241, 245, 249);
            doc.rect(mockX, currentY, width, 12, 'F');
            // Round top corners manually
            drawRoundedRect(mockX, currentY, width, 14, 4, null, [200, 210, 220]);
            doc.setFillColor(241, 245, 249);
            doc.roundedRect(mockX + 0.5, currentY + 0.5, width - 1, 12, 3.5, 3.5, 'F');
            
            // Browser dots
            doc.setFillColor(239, 68, 68);
            doc.circle(mockX + 7, currentY + 6, 1.8, 'F');
            doc.setFillColor(245, 158, 11);
            doc.circle(mockX + 13, currentY + 6, 1.8, 'F');
            doc.setFillColor(34, 197, 94);
            doc.circle(mockX + 19, currentY + 6, 1.8, 'F');
            
            // URL bar
            drawRoundedRect(mockX + 28, currentY + 3, width - 56, 6, 2, [226, 232, 240], null);
            doc.setFontSize(5);
            doc.setTextColor(...TEXT_LIGHT);
            doc.text(title || 'ktmalka-nomination.vercel.app', mockX + 31, currentY + 7.2);
            
            return { x: mockX, y: currentY + 14, w: width, contentY: currentY + 14 };
        }
        
        function drawFormField(x, y, w, label, placeholder, type) {
            doc.setFontSize(7);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(...TEXT_DARK);
            doc.text(label, x, y);
            
            if (type === 'select') {
                drawRoundedRect(x, y + 1.5, w, 7, 1.5, WHITE, [200, 210, 220]);
                doc.setFontSize(6);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(...MEDIUM_GRAY);
                doc.text(placeholder, x + 2, y + 6);
                // Dropdown arrow
                doc.text('▼', x + w - 5, y + 6);
            } else if (type === 'textarea') {
                drawRoundedRect(x, y + 1.5, w, 14, 1.5, WHITE, [200, 210, 220]);
                doc.setFontSize(6);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(...MEDIUM_GRAY);
                doc.text(placeholder, x + 2, y + 6);
            } else if (type === 'file') {
                drawRoundedRect(x, y + 1.5, w, 7, 1.5, [248, 250, 252], [200, 210, 220]);
                doc.setFontSize(6);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(...INFO_BLUE);
                doc.text('Choose File', x + 2, y + 6);
                doc.setTextColor(...MEDIUM_GRAY);
                doc.text('No file chosen', x + 22, y + 6);
            } else if (type === 'radio') {
                doc.setFontSize(6);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(...TEXT_DARK);
                // Yes radio
                doc.circle(x + 1.5, y + 4.5, 2, 'S');
                doc.setFillColor(...NAVY);
                doc.circle(x + 1.5, y + 4.5, 1, 'F');
                doc.text('Yes', x + 5, y + 5.5);
                // No radio
                doc.setDrawColor(200, 210, 220);
                doc.circle(x + 16, y + 4.5, 2, 'S');
                doc.text('No', x + 20, y + 5.5);
            } else if (type === 'checkbox') {
                drawRoundedRect(x, y + 1.5, 4, 4, 0.5, WHITE, [200, 210, 220]);
                doc.setFontSize(6);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(...TEXT_DARK);
                doc.text(placeholder, x + 6, y + 5);
            } else {
                drawRoundedRect(x, y + 1.5, w, 7, 1.5, WHITE, [200, 210, 220]);
                doc.setFontSize(6);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(...MEDIUM_GRAY);
                doc.text(placeholder, x + 2, y + 6);
            }
        }
        
        function drawButton(x, y, w, h, text, isPrimary) {
            if (isPrimary) {
                drawRoundedRect(x, y, w, h, h/2, GOLD, null);
                doc.setFontSize(7);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(...NAVY);
            } else {
                drawRoundedRect(x, y, w, h, h/2, null, GOLD);
                doc.setFontSize(7);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(...GOLD);
            }
            doc.text(text, x + w/2, y + h/2 + 1, { align: 'center' });
        }
        
        function drawAnnotation(x1, y1, x2, y2, text, side) {
            doc.setDrawColor(...WARNING);
            doc.setLineWidth(0.4);
            doc.setLineDashPattern([1.5, 1], 0);
            doc.line(x1, y1, x2, y2);
            doc.setLineDashPattern([], 0);
            
            // Arrow dot
            doc.setFillColor(...WARNING);
            doc.circle(x1, y1, 0.8, 'F');
            
            // Text
            doc.setFontSize(7);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(...WARNING);
            if (side === 'left') {
                doc.text(text, x2 - 2, y2 - 1, { align: 'right' });
            } else {
                doc.text(text, x2 + 2, y2 - 1);
            }
        }
        
        // ---- Getting Started Content ----
        drawSectionHeader('Getting Started', 1);
        
        doc.setFontSize(11);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(...TEXT_DARK);
        const introText = 'This manual will guide you through the complete process of filling up the Leo Club of Kathmandu Alka nomination form. The form is organized into 6 easy steps with a progress bar at the top.';
        const introLines = doc.splitTextToSize(introText, CW);
        doc.text(introLines, ML, currentY);
        currentY += introLines.length * 5 + 5;
        
        drawNumberedInstruction(1, 'Open Your Browser', 'Open any web browser (Chrome, Firefox, Edge, Safari) on your computer or mobile phone.');
        drawNumberedInstruction(2, 'Visit the Form URL', 'Go to: https://ktmalka-nomination.vercel.app');
        drawNumberedInstruction(3, 'Welcome Modal Appears', 'A popup will appear showing the official "Notice & Criteria" images. Read them carefully.');
        drawNumberedInstruction(4, 'Review Both Slides', 'Use the arrow buttons (◂ and ▸) or dots to navigate between the Notice and Criteria slides.');
        drawNumberedInstruction(5, 'Click "I Understand"', 'After reading, click the gold "I Understand" button to close the modal and access the form.');
        
        currentY += 3;
        drawInfoBox('Make sure you read the Notice and Criteria carefully before proceeding. They contain important eligibility requirements and deadlines.', 'warning');
        
        // Mockup of welcome modal
        currentY += 2;
        const mock1 = drawScreenMockup('ktmalka-nomination.vercel.app', [], 130, 80);
        
        // Modal overlay
        doc.setFillColor(0, 0, 0);
        doc.setGState(new doc.GState({ opacity: 0.3 }));
        doc.rect(mock1.x, mock1.contentY, 130, 66, 'F');
        doc.setGState(new doc.GState({ opacity: 1 }));
        
        // Modal box
        const modalX = mock1.x + 20;
        const modalY = mock1.contentY + 8;
        drawRoundedRect(modalX, modalY, 90, 50, 3, WHITE, [200, 210, 220]);
        
        doc.setFontSize(9);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(...NAVY);
        doc.text('Notice & Criteria', modalX + 45, modalY + 10, { align: 'center' });
        
        // Image placeholder
        drawRoundedRect(modalX + 10, modalY + 15, 70, 18, 2, LIGHT_GRAY, null);
        doc.setFontSize(7);
        doc.setTextColor(...MEDIUM_GRAY);
        doc.text('Notice / Criteria Image', modalX + 45, modalY + 26, { align: 'center' });
        
        // Dots
        doc.setFillColor(...GOLD);
        doc.circle(modalX + 41, modalY + 37, 1.5, 'F');
        doc.setFillColor(...MEDIUM_GRAY);
        doc.circle(modalX + 48, modalY + 37, 1.5, 'F');

        drawInfoBox('Once you submit, your nomination status will be "Pending" until the admin reviews it. You cannot edit your submission after it is submitted.', 'info');
        
        // Submission flow mockup
        currentY += 2;
        checkSpace(60);
        const mock7 = drawScreenMockup('ktmalka-nomination.vercel.app', [], 130, 55);
        
        doc.setFontSize(8);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(...NAVY);
        doc.text('6. Declaration', mock7.x + 10, mock7.contentY + 6);
        
        // Checkboxes
        drawFormField(mock7.x + 10, mock7.contentY + 11, 110, '', 'I confirm I have no criminal record.', 'checkbox');
        drawFormField(mock7.x + 10, mock7.contentY + 20, 110, '', 'I agree to the general terms and conditions...', 'checkbox');
        
        // Submit button
        drawRoundedRect(mock7.x + 80, mock7.contentY + 30, 38, 7, 3.5, SUCCESS, null);
        doc.setFontSize(6.5);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(...WHITE);
        doc.text('Submit Nomination', mock7.x + 99, mock7.contentY + 35, { align: 'center' });
        
        // Arrow to preview
        doc.setDrawColor(...GOLD);
        doc.setLineWidth(0.5);
        doc.line(mock7.x + 99, mock7.contentY + 38, mock7.x + 65, mock7.contentY + 43);
        doc.setFillColor(...GOLD);
        doc.circle(mock7.x + 65, mock7.contentY + 43, 0.8, 'F');
        
        // Preview mini-modal
        drawRoundedRect(mock7.x + 25, mock7.contentY + 40, 80, 12, 2, WHITE, GOLD);
        doc.setFontSize(6);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(...NAVY);
        doc.text('Nomination Preview', mock7.x + 65, mock7.contentY + 44, { align: 'center' });
        doc.setFontSize(5);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(...TEXT_LIGHT);
        doc.text('Review your details → Edit / Confirm & Submit', mock7.x + 65, mock7.contentY + 49, { align: 'center' });
        
        currentY = mock7.contentY + 55 + 5;
        
        drawPageFooter();
        
        // ========================================
        // TROUBLESHOOTING & FAQ
        // ========================================
        updateProgress(92, 'Creating Troubleshooting section...');
        await new Promise(r => setTimeout(r, 100));
        addPage();
        drawSectionHeader('Troubleshooting & FAQ', 9);
        
        const faqs = [
            {
                q: 'Q: The page shows "Nominations Closed". What should I do?',
                a: 'The submission deadline has passed. Contact the admin for more information or check if the deadline has been extended.'
            },
            {
                q: 'Q: My Leo ID is not being verified. What went wrong?',
                a: 'Make sure you are entering the correct Leo ID. If the issue persists, use the "Search Directory" button to look up your member record, or select "No" for Leo ID and enter your details manually.'
            },
            {
                q: 'Q: I can\'t upload my file. It says "invalid format".',
                a: 'Check the accepted format for each document: Cover Letter → PDF only, Formal Photo → JPG only, Citizenship → PDF only. Convert your file to the correct format before uploading.'
            },
            {
                q: 'Q: My file is too large (over 5 MB). How do I compress it?',
                a: 'For PDFs, use ilovepdf.com to compress. For images, use tinypng.com or tinyjpg.com to reduce file size while maintaining quality.'
            },
            {
                q: 'Q: I don\'t have eSewa. How can I pay?',
                a: 'Contact the club admin for alternative payment methods. The form currently supports eSewa QR payment only.'
            },
            {
                q: 'Q: I submitted but made a mistake. Can I edit my submission?',
                a: 'Once submitted, you cannot edit your application. Contact the admin to request changes or corrections to your nomination.'
            },
            {
                q: 'Q: The form is not loading properly on my phone.',
                a: 'Try using a modern browser like Chrome or Safari. Clear your browser cache and try again. Ensure you have a stable internet connection.'
            },
            {
                q: 'Q: Where can I check my nomination status?',
                a: 'Your nomination status will be communicated by the admin. The admin panel shows all submissions with their current status (Pending, Approved, or Rejected).'
            },
        ];
        
        faqs.forEach((faq, i) => {
            checkSpace(28);
            
            // Question
            doc.setFontSize(9.5);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(...NAVY);
            const qLines = doc.splitTextToSize(faq.q, CW - 5);
            doc.text(qLines, ML + 3, currentY);
            currentY += qLines.length * 4.5 + 1;
            
            // Answer
            doc.setFontSize(9);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(...TEXT_DARK);
            const aLines = doc.splitTextToSize(faq.a, CW - 10);
            doc.text(aLines, ML + 8, currentY);
            currentY += aLines.length * 4.5 + 4;
            
            // Separator
            if (i < faqs.length - 1) {
                doc.setDrawColor(226, 232, 240);
                doc.setLineWidth(0.2);
                doc.line(ML, currentY - 1, ML + CW, currentY - 1);
                currentY += 3;
            }
        });
        
        // Contact info box
        currentY += 5;
        checkSpace(30);
        drawRoundedRect(ML, currentY, CW, 25, 3, NAVY, null);
        doc.setFontSize(10);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(...GOLD);
        doc.text('Need Further Help?', ML + CW/2, currentY + 8, { align: 'center' });
        doc.setFontSize(9);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(...WHITE);
        doc.text('Contact the Leo Club of Kathmandu Alka admin team.', ML + CW/2, currentY + 15, { align: 'center' });
        doc.text('Visit: https://lckathmandualka.org.np', ML + CW/2, currentY + 21, { align: 'center' });
        
        drawPageFooter();
        
        // ========================================
        // Add page footers to all pages
        // ========================================
        const totalPages = doc.getNumberOfPages();
        for (let i = 2; i <= totalPages; i++) {
            doc.setPage(i);
            pageNum = i;
            // Footer already drawn per page above, but re-set page num text
        }
        
        // ========================================
        // SAVE PDF
        // ========================================
        updateProgress(100, 'PDF generated successfully!');
        
        // Use blob download approach for proper filename
        const pdfOutput = doc.output('arraybuffer');
        const blob = new Blob([pdfOutput], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'Leo_Club_Nomination_Form_User_Manual.pdf';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        
        btn.disabled = false;
        btn.textContent = '✅ Download Again';
        progressText.textContent = 'PDF downloaded! Click button to generate again.';
    }
    </script>
</body>
</html>
