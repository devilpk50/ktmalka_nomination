<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Events - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
    
    <style>
        body { overflow-x: hidden; }
        #sidebar { min-width: 250px; background-color: #f8f9fa; border-right: 1px solid #dee2e6; max-width: 250px; min-height: 100vh; transition: all 0.3s; }
        #sidebar .nav-link { color: #495057; border-radius: 6px; margin-bottom: 5px; font-weight: 500; }
        #sidebar .nav-link:hover { color: #0d6efd; background: rgba(13, 110, 253, 0.05); }
        #sidebar .nav-link.active { color: #0d6efd; background: rgba(13, 110, 253, 0.1); font-weight: 600; }
        #page-content-wrapper { width: 100%; }
        .admin-footer { margin-top: auto; background-color: #000; padding: 16px 20px; text-align: center; color: #fff; font-size: 0.875rem; }
        @media (max-width: 768px) {
            #sidebar { margin-left: -250px; position: fixed; z-index: 1000; }
            #sidebar.active { margin-left: 0; }
        }

        
        
        .dashboard-title { font-weight: 700; text-align: center; margin-bottom: 2rem; }
        .admin-footer { margin-top: auto; background-color: #000; padding: 16px 20px; text-align: center; color: #fff; font-size: 0.875rem; }
        .editor-container { background: #fff; border: 1px solid #ced4da; border-radius: 0.375rem; padding: 1rem; }
        #pageContent { min-height: 400px; font-family: monospace; }
    </style>
</head>
<body>
    
    <div id="wrapper" class="d-flex">
        <!-- Sidebar -->
        <nav id="sidebar" class="bg-light text-dark p-3 d-flex flex-column">
            <a class="navbar-brand text-dark d-flex align-items-center mb-4" href="/admin">
                <img src="/images/logo.png" alt="Logo" height="40" class="me-2 bg-white rounded">
                <span class="fs-5 fw-bold">Admin Panel</span>
            </a>
            <hr class="text-secondary">
            <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item"><a class="nav-link " href="/admin"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link " href="/admin/members"><i class="bi bi-people me-2"></i> Members</a></li>
                <li class="nav-item"><a class="nav-link " href="/admin/contacts"><i class="bi bi-envelope me-2"></i> Contacts</a></li>
                <li class="nav-item"><a class="nav-link " href="/admin/newsletter"><i class="bi bi-newspaper me-2"></i> Newsletter</a></li>
                <li class="nav-item"><a class="nav-link " href="/admin/menu"><i class="bi bi-list me-2"></i> Menu</a></li>
                <li class="nav-item"><a class="nav-link " href="/admin/pages"><i class="bi bi-file-earmark-text me-2"></i> Pages</a></li>
                <li class="nav-item"><a class="nav-link " href="/admin/projects"><i class="bi bi-briefcase me-2"></i> Projects</a></li>
                <li class="nav-item"><a class="nav-link active" href="/admin/events"><i class="bi bi-calendar-event me-2"></i> Events</a></li>
                <li class="nav-item"><a class="nav-link " href="/admin/sliders"><i class="bi bi-images me-2"></i> Sliders</a></li>
            </ul>
            <hr class="text-secondary">
            <div>
                <a href="#" class="nav-link text-dark" id="logoutLink"><i class="bi bi-box-arrow-right me-2"></i> Logout</a>
            </div>
        </nav>

        <!-- Page Content -->
        <div id="page-content-wrapper" class="flex-grow-1 d-flex flex-column min-vh-100">
            <!-- Top Navbar for mobile toggle -->
            <nav class="navbar navbar-light bg-light border-bottom d-md-none px-3">
                <button class="btn btn-outline-dark" id="sidebarToggle"><i class="bi bi-list fs-4"></i></button>
                <span class="navbar-brand mb-0 h1 ms-2">Admin Panel</span>
            </nav>


    <main class="container flex-grow-1 py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="page-title mb-0">Manage Events</h1>
            <button class="btn btn-primary" id="addEventBtn"><i class="bi bi-plus-lg me-2"></i>Add Event</button>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="eventsTable">
                        <thead class="table-light">
                            <tr>
                                <th width="60">Image</th>
                                <th>Title</th>
                                <th>Date</th>
                                <th>Location</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Event Modal -->
    <div class="modal fade" id="eventModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="eventModalTitle">Add New Event</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="eventForm">
                        <input type="hidden" id="eventId">
                        <div class="row mb-3">
                            <div class="col-md-12 mb-3">
                                <label class="form-label fw-bold">Title <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="eventTitle" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Date</label>
                                <input type="date" class="form-control" id="eventDate">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Time</label>
                                <div class="input-group">
                                    <input type="time" class="form-control" id="eventStartTime">
                                    <span class="input-group-text">to</span>
                                    <input type="time" class="form-control" id="eventEndTime">
                                </div>
                                <input type="hidden" id="eventTime">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Location</label>
                                <input type="text" class="form-control" id="eventLocation" placeholder="e.g. Kathmandu">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Status</label>
                                <select class="form-select" id="eventStatus">
                                    <option value="Upcoming">Upcoming</option>
                                    <option value="Past Event">Past Event</option>
                                    <option value="Ongoing">Ongoing</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Image</label>
                                <input type="file" class="form-control mb-2" id="eventImageFile" accept="image/*">
                                <span id="eventImageStatus" class="badge bg-secondary mb-2" style="display:none;"></span>
                                <input type="hidden" id="eventImage">
                                <div id="eventImagePreviewContainer" style="display:none;">
                                    <img id="eventImagePreview" src="" alt="Preview" style="max-height: 100px; border-radius: 4px;">
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Category</label>
                                <input type="text" class="form-control" id="eventCategory" placeholder="e.g. Health, Education">
                            </div>
                            <div class="col-md-12 mb-3">
                                <label class="form-label fw-bold">Short Description (for cards)</label>
                                <textarea class="form-control" id="eventDescription" rows="2"></textarea>
                            </div>
                            <div class="col-md-12 mb-3">
                                <label class="form-label fw-bold">Full Details (About This Event)</label>
                                <textarea class="form-control" id="eventDetails" rows="4"></textarea>
                            </div>
                            <div class="col-md-12 mb-3">
                                <label class="form-label fw-bold">Objectives (One per line)</label>
                                <textarea class="form-control" id="eventObjectives" rows="4" placeholder="Objective 1&#10;Objective 2"></textarea>
                            </div>
                            <div class="col-md-12 mb-3">
                                <label class="form-label fw-bold">Contact & Registration Info</label>
                                <textarea class="form-control" id="eventContact" rows="3" placeholder="How to get involved or who to contact"></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveEventBtn">Save Event</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="admin-footer">
        <img src="/images/logo.png" alt="Leo Club Logo" height="30" class="me-2 mb-1">
        &copy; 2026 Leo Club of Kathmandu Alka - All rights reserved
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/admin-common.js"></script>
    <script src="/js/admin-events.js"></script>

    </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('sidebarToggle');
            if(toggle) {
                toggle.addEventListener('click', function() {
                    document.getElementById('sidebar').classList.toggle('active');
                });
            }
        });
    </script>
</body>
</html>
